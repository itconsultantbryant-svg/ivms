# Render Blueprint – deploy Backend (Node) + PostgreSQL.
# Frontend should be deployed on Vercel.

databases:
  - name: inventory-db
    plan: free
    region: oregon
    databaseName: inventory
    user: inventory

services:
  - type: web
    name: inventory-api
    runtime: node
    region: oregon
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC_ALTER
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
